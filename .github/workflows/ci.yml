name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: [self-hosted, linux, x64, docker, nova-ve-ci]
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest

      - name: Import app
        run: python -c "from app.main import app; print(app.title)"

      - name: Compile backend sources
        run: python -m compileall app tests

  frontend:
    runs-on: [self-hosted, linux, x64, docker, nova-ve-ci]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend checks
        run: npm run check

      - name: Build frontend
        run: npm run build

  compose-smoke:
    runs-on: [self-hosted, linux, x64, docker, nova-ve-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Clean any stale compose state
        run: docker compose down -v || true

      - name: Validate compose file
        run: docker compose config -q

      - name: Start database and wait for healthcheck
        run: |
          docker compose up -d db
          container_id="$(docker compose ps -q db)"
          for _ in $(seq 1 30); do
            status="$(docker inspect --format='{{.State.Health.Status}}' "$container_id" 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          exit 1

      - name: Tear down compose stack
        if: always()
        run: docker compose down -v
