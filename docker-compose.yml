services:
  db-init:
    image: alpine:3.21
    restart: "no"
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-}
    volumes:
      - labdata:/data
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -f /data/db_password ]; then
          echo "Generating random database password..."
          umask 077
          if [ -n "$${DB_PASSWORD:-}" ]; then
            printf '%s\n' "$${DB_PASSWORD}" > /data/db_password
          else
            tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 32 > /data/db_password
          fi
          chmod 600 /data/db_password
          echo "Done."
        else
          echo "Database password already exists."
        fi

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-nova}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${DB_NAME:-novadb}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - labdata:/run/secrets:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nova} -d ${DB_NAME:-novadb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      db-init:
        condition: service_completed_successfully

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-nova}
      DB_NAME: ${DB_NAME:-novadb}
      # DATABASE_URL is auto-constructed from /data/db_password + the DB_* vars above.
      # Set DATABASE_URL explicitly to override: postgresql+asyncpg://user:pass@host:5432/db
      BASE_DATA_DIR: /data
      LABS_DIR: /data/labs
      IMAGES_DIR: /data/images
      TMP_DIR: /data/tmp
    volumes:
      - labdata:/data
      - ./backend/labs:/data/labs:ro
    ports:
      - "8000:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  labdata:
