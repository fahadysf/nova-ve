type: qemu
name: Microsoft Windows Server
description: Microsoft Windows Server
icon_type: server
cpu: 4
ram: 4096
console_type: vnc
qemu_options: -machine type=pc,accel=kvm -cpu host,+fsgsbase -vga qxl -usbdevice tablet -boot order=dc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: Ethernet {port}
