type: qemu
name: Cisco SD-WAN vManage
description: Cisco SD-WAN vManage
icon_type: server
cpu: 4
ram: 16384
ethernet: 2
console_type: telnet
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -cpu host -vga std -usbdevice tablet -boot order=dc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: eth{n}
