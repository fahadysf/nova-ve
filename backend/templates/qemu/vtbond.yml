type: qemu
name: Cisco SD-WAN vBond
description: Cisco SD-WAN vBond
icon_type: router
cpu: 2
ram: 2048
ethernet: 2
console_type: telnet
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -cpu host -vga std -usbdevice tablet -boot order=dc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format:
  - eth0
  - ge0/{n}
