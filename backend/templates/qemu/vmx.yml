type: qemu
name: Juniper vMX
description: Juniper vMX
icon_type: router
cpu: 1
ram: 2048
ethernet: 6
console_type: telnet
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format:
  - em0 / fxp0
  - em1 / Internal use
  - ge-0/0/{n}
