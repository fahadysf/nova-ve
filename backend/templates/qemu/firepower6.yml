type: qemu
name: Cisco Firepower 6
description: Cisco Firepower 6
icon_type: firewall
cpu: 4
ram: 8192
ethernet: 5
console_type: vnc
qemu_options: -machine type=pc,accel=kvm -no-user-config -nodefaults -display none -vga std -rtc base=utc -cpu host
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format:
  - eth0 / mgmt
  - GigabitEthernet0/{n}
