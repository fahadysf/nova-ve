type: qemu
name: pfSense CE
description: pfSense CE
icon_type: firewall
cpu: 2
ram: 4096
ethernet: 2
console_type: vnc
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -usbdevice tablet -boot order=dc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: vtnet{n}
