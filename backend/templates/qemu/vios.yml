type: qemu
name: Cisco IOSv
description: Cisco IOSv
icon_type: router
cpu: 1
ram: 1024
ethernet: 4
console_type: telnet
qemu_options: -machine type=pc,accel=kvm -no-user-config -nodefaults -rtc base=utc -cpu host
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: GigabitEthernet0/{n}
