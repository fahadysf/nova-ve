type: qemu
name: Juniper vSRX
description: Juniper vSRX
icon_type: firewall
cpu: 2
ram: 2048
ethernet: 4
console_type: telnet
qemu_options: -machine type=pc,accel=kvm -no-user-config -nodefaults -rtc base=utc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format:
  - fxp0
  - ge-0/0/{n}
