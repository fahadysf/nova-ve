type: qemu
name: SonicWall NSv
description: SonicWall NSv
icon_type: firewall
cpu: 4
ram: 6144
ethernet: 8
console_type: vnc
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -rtc base=utc -cpu host
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: X{n}
