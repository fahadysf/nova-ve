type: qemu
name: Dell SmartFabric OS10
description: Dell SmartFabric OS10
icon_type: switch
cpu: 4
ram: 4096
ethernet: 16
console_type: telnet
qemu_options: -machine type=pc,accel=kvm -vga std -usbdevice tablet -boot order=cd -cpu host
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: ethernet1/1/{port}
