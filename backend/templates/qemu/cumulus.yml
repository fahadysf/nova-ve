type: qemu
name: NVIDIA Cumulus VX
description: NVIDIA Cumulus VX
icon_type: switch
cpu: 1
ram: 256
ethernet: 8
console_type: telnet
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -rtc base=utc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format:
  - eth0
  - swp{port}
