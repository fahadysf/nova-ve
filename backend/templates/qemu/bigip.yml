type: qemu
name: F5 BIG-IP VE
description: F5 BIG-IP VE
icon_type: firewall
cpu: 2
ram: 4096
ethernet: 4
console_type: telnet
qemu_options: -machine type=pc,accel=kvm -no-user-config -nodefaults -display none -vga std -rtc base=utc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format:
  - MGMT
  - 1.{port}
