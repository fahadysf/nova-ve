type: qemu
name: Huawei USG6000V
description: Huawei USG6000V
icon_type: firewall
cpu: 2
ram: 4096
ethernet: 6
console_type: vnc
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -vga std -usbdevice tablet -boot order=cd
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format:
  - GigabitEthernet0/0/0
  - GigabitEthernet1/0/{n}
