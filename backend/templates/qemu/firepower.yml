type: qemu
name: Cisco Firepower
description: Cisco Firepower
icon_type: firewall
cpu: 4
ram: 4096
ethernet: 4
console_type: vnc
qemu_options: -machine type=pc-1.0,accel=kvm -no-user-config -nodefaults -display none -vga std -rtc base=utc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format:
  - eth0 / mgmt
  - GigabitEthernet0/{n}
