type: qemu
name: Cisco FMC 7
description: Cisco Firepower Management Center 7
icon_type: server
cpu: 4
ram: 28762
console_type: vnc
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -no-user-config -nodefaults -display none -vga std -rtc base=utc -cpu host
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: eth{n}
