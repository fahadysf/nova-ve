type: qemu
name: MikroTik CHR
description: MikroTik Cloud Hosted Router
icon_type: router
cpu: 1
ram: 512
ethernet: 4
console_type: telnet
qemu_options: -machine type=pc,accel=kvm -no-user-config -nodefaults -display none -vga std -rtc base=utc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: ether{port}
