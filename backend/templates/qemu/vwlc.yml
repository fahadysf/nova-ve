type: qemu
name: Cisco vWLC
description: Cisco vWLC
icon_type: router
cpu: 1
ram: 2048
ethernet: 2
console_type: telnet
qemu_options: -machine type=pc,accel=kvm -no-user-config -nodefaults -rtc base=utc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: GigabitEthernet0/0/{n}
