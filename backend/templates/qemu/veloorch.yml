type: qemu
name: VMware SD-WAN Orchestrator
description: VMware SD-WAN Orchestrator
icon_type: server
cpu: 4
ram: 16384
console_type: telnet
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -vga std -usbdevice tablet -boot order=dc -cpu host
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: eth{n}
