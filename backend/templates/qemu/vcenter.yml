type: qemu
name: VMware vCenter
description: VMware vCenter Server
icon_type: server
cpu: 2
ram: 10240
console_type: vnc
qemu_options: -machine pc,accel=kvm -no-user-config -nodefaults -display none -vga std -rtc base=utc -cpu host
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: eth{n}
