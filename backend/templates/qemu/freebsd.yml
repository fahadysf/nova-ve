type: qemu
name: FreeBSD
description: FreeBSD
icon_type: server
cpu: 2
ram: 4092
ethernet: 2
console_type: vnc
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -usbdevice tablet -boot order=cd
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: vtnet{n}
