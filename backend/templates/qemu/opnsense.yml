type: qemu
name: OPNsense
description: OPNsense
icon_type: firewall
cpu: 2
ram: 2048
ethernet: 2
console_type: telnet
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -usbdevice tablet -boot order=dc
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: vtnet{n}
