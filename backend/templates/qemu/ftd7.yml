type: qemu
name: Cisco FTD 7
description: Cisco FTD 7
icon_type: firewall
cpu: 4
ram: 8192
ethernet: 6
console_type: vnc
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -no-user-config -nodefaults -display none -vga std -rtc base=utc -cpu host
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format:
  - Management0/0
  - Diagnostic0/0
  - GigabitEthernet0/{n}
