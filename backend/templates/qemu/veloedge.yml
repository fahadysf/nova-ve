type: qemu
name: VMware SD-WAN Edge
description: VMware SD-WAN Edge
icon_type: router
cpu: 2
ram: 4096
ethernet: 6
console_type: telnet
qemu_nic: virtio-net-pci
qemu_options: -machine type=pc,accel=kvm -vga std -usbdevice tablet -boot order=dc -cpu host
capabilities:
  machine: pc
  hotplug: false
  max_nics: 8
interface_naming:
  format: GE{port}
